<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דיווח נוכחות - שאר ישוב</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap');
        body { font-family: 'Rubik', sans-serif; background-color: #f3f4f6; }
        .status-btn.selected { ring: 6px; transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <script>
        // הקישור העדכני ביותר לשרת גוגל שלך
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2TM1Q-b57aZlb2QnbWxD4uDf35iZxI1S_bUx3CK-9N1cYMmbnR_gPU0h9-faliPckcw/exec"; 
    </script>

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden animate-fade-in">
        
        <!-- Header Section -->
        <div class="bg-blue-600 p-6 text-center text-white">
            <h1 class="text-2xl font-bold">מערכת דיווח חירום</h1>
            <p class="text-blue-100 mt-1">שאר ישוב</p>
        </div>

        <div class="p-6 space-y-6">
            
            <!-- Contact Information Box -->
            <div class="bg-blue-50 border border-blue-100 rounded-2xl p-4 text-center shadow-sm">
                <p class="font-bold text-blue-900 mb-3 border-b border-blue-200 pb-2">למידע נוסף ויצירת קשר:</p>
                <div class="flex flex-col gap-2 text-md text-blue-800">
                    <p class="flex items-center justify-center gap-2">
                        <span>שיר לניאדו:</span>
                        <a href="tel:050-6816689" class="font-bold hover:text-blue-600 transition-colors" dir="ltr">050-6816689</a>
                    </p>
                    <p class="flex items-center justify-center gap-2">
                        <span>עינת רותם:</span>
                        <a href="tel:0544372768" class="font-bold hover:text-blue-600 transition-colors" dir="ltr">0544372768</a>
                    </p>
                </div>
            </div>

            <div class="text-center">
                <p class="text-gray-600 font-medium">אנא הזדהו ובחרו את הסטטוס העדכני שלכם</p>
            </div>

            <!-- Phone Number Input -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">מספר טלפון נייד</label>
                <input type="tel" id="residentPhone" placeholder="לדוגמה: 050-1234567" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:ring-0 focus:border-blue-500 outline-none text-lg transition-all dir-ltr text-right">
            </div>

            <!-- Visual Status Selection -->
            <div>
                <label class="block text-gray-700 font-semibold mb-3">בחרו סטטוס נוכחות</label>
                <div class="grid grid-cols-2 gap-4">
                    <!-- Status Found (Sends 1 to Sheets) -->
                    <button onclick="selectStatus('1')" id="btnStatus1" class="status-btn py-5 px-2 rounded-2xl border-2 border-green-200 bg-green-50 text-green-700 font-bold hover:bg-green-100 transition-all flex flex-col items-center gap-3">
                        <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center shadow-md">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="text-lg">נמצא</span>
                    </button>
                    <!-- Status Not Found (Sends 0 to Sheets) -->
                    <button onclick="selectStatus('0')" id="btnStatus0" class="status-btn py-5 px-2 rounded-2xl border-2 border-red-200 bg-red-50 text-red-700 font-bold hover:bg-red-100 transition-all flex flex-col items-center gap-3">
                        <div class="w-10 h-10 bg-red-500 rounded-full flex items-center justify-center shadow-md">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </div>
                        <span class="text-lg">לא נמצא</span>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <!-- Additional Family Members (Column F) -->
                <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                    <label class="block text-emerald-900 font-bold mb-3 text-center text-sm italic">בני משפחה נוספים לידך?</label>
                    <div class="flex items-center justify-center gap-4">
                        <button onclick="changeValue('extraFamily', -1)" class="w-10 h-10 bg-white shadow-sm rounded-full text-xl font-bold text-emerald-600 hover:bg-emerald-100 transition-all focus:outline-none">-</button>
                        <input type="number" id="extraFamily" value="0" min="0" readonly class="w-16 text-center text-2xl font-bold bg-transparent border-none outline-none text-emerald-900 focus:ring-0">
                        <button onclick="changeValue('extraFamily', 1)" class="w-10 h-10 bg-emerald-600 shadow-sm rounded-full text-xl font-bold text-white hover:bg-emerald-700 transition-all focus:outline-none">+</button>
                    </div>
                </div>

                <!-- Guests (Column E) -->
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <label class="block text-blue-900 font-bold mb-3 text-center text-sm italic">אורחים נוספים לידך?</label>
                    <div class="flex items-center justify-center gap-4">
                        <button onclick="changeValue('extraGuests', -1)" class="w-10 h-10 bg-white shadow-sm rounded-full text-xl font-bold text-blue-600 hover:bg-blue-100 transition-all focus:outline-none">-</button>
                        <input type="number" id="extraGuests" value="0" min="0" readonly class="w-16 text-center text-2xl font-bold bg-transparent border-none outline-none text-blue-900 focus:ring-0">
                        <button onclick="changeValue('extraGuests', 1)" class="w-10 h-10 bg-blue-600 shadow-sm rounded-full text-xl font-bold text-white hover:bg-blue-700 transition-all focus:outline-none">+</button>
                    </div>
                </div>
            </div>

            <!-- Submit Action -->
            <button id="btnSubmitReport" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-xl shadow-lg hover:bg-blue-700 hover:shadow-xl transition-all active:scale-[0.98]">
                שלח דיווח מעודכן
            </button>

            <!-- Success/Error Feedback -->
            <div id="reportFeedback" class="hidden p-4 rounded-xl text-center font-bold text-sm"></div>
        </div>
    </div>

    <script>
        let currentStatus = null;
        const btnSubmit = document.getElementById('btnSubmitReport');
        const feedback = document.getElementById('reportFeedback');

        /**
         * בוחר את הסטטוס (נמצא=1, לא נמצא=0) ומעדכן עיצוב
         */
        function selectStatus(val) {
            currentStatus = val;
            document.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('ring-6', 'scale-102', 'ring-green-400', 'ring-red-400'));
            if(val === '1') document.getElementById('btnStatus1').classList.add('ring-6', 'ring-green-400', 'scale-102');
            if(val === '0') document.getElementById('btnStatus0').classList.add('ring-6', 'ring-red-400', 'scale-102');
        }

        /**
         * משנה ערך של מונה (אורחים/משפחה)
         */
        function changeValue(id, delta) {
            const el = document.getElementById(id);
            let val = parseInt(el.value) || 0;
            val = Math.max(0, val + delta);
            el.value = val;
        }

        /**
         * מציג הודעת משוב למשתמש
         */
        function showFeedback(msg, isError) {
            feedback.textContent = msg;
            feedback.className = `p-4 rounded-xl text-center font-bold text-sm ${isError ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-green-100 text-green-700 border border-green-200'}`;
            feedback.classList.remove('hidden');
            setTimeout(() => feedback.classList.add('hidden'), 5000);
        }

        /**
         * שליחת הנתונים לשרת גוגל
         */
        btnSubmit.addEventListener('click', () => {
            const phone = document.getElementById('residentPhone').value.trim();
            const guests = parseInt(document.getElementById('extraGuests').value) || 0;
            const family = parseInt(document.getElementById('extraFamily').value) || 0;

            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("macros")) {
                // בדיקה בסיסית שהקישור הוזן
            } else {
                 showFeedback("שגיאה: חסר קישור תקין לשרת.", true);
                 return;
            }

            const cleanPhone = phone.replace(/\D/g, '');
            if (cleanPhone.length < 6) {
                showFeedback("אנא הזן מספר טלפון תקין (לפחות 6 ספרות).", true);
                return;
            }

            if (currentStatus === null) {
                showFeedback("אנא בחר סטטוס נוכחות: נמצא או לא נמצא.", true);
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "שולח נתונים...";

            const now = new Date();
            const formattedDate = now.toLocaleDateString('he-IL') + " " + now.toLocaleTimeString('he-IL');

            // הכנת הפרמטרים לשליחה
            const formData = new URLSearchParams();
            formData.append('id', cleanPhone.slice(-6)); // שולח 6 ספרות אחרונות להשוואה
            formData.append('status', currentStatus);
            formData.append('guests', guests);
            formData.append('family', family);
            formData.append('timestamp', formattedDate);

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            }).then(() => {
                showFeedback("הדיווח נקלט בהצלחה! תודה.", false);
                // איפוס טופס
                document.getElementById('residentPhone').value = '';
                document.getElementById('extraGuests').value = '0';
                document.getElementById('extraFamily').value = '0';
                currentStatus = null;
                document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('ring-6', 'scale-102', 'ring-green-400', 'ring-red-400'));
            }).catch(err => {
                showFeedback("אירעה שגיאה בשליחה. בדוק חיבור אינטרנט ונסה שוב.", true);
            }).finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "שלח דיווח מעודכן";
            });
        });
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
