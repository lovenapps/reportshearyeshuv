<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דיווח נוכחות - שאר ישוב</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap');
        body { font-family: 'Rubik', sans-serif; background-color: #f3f4f6; }
        .status-btn.selected { border-color: currentColor; }
        .status-btn.selected .radio-circle { background-color: currentColor; border-color: currentColor; box-shadow: inset 0 0 0 4px white; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <script>
        // הקישור לסקריפט גוגל
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFaDGqPxEsM5Gfx0gV-u5P5UFOOJmo-onJWUqz5VxvSvvDdOZIq3joGhgHJTB0TJdi7Q/exec"; 
    </script> 

    <!-- Success View -->
    <div id="successView" class="hidden max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 text-center border-4 border-green-500">
        <h2 class="text-3xl font-black mb-4">תודה רבה!</h2>
        <p class="text-xl font-bold text-green-700 mb-6">ההודעה נשלחה בהצלחה.</p>
        <p class="text-gray-600 mb-2">למידע נוסף: שיר 050-6816689 | עינת 054-4372768</p>
        <p class="text-2xl font-black text-blue-700 uppercase tracking-widest">צוות צח"י</p>
    </div>

    <div id="mainCard" class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">
        
        <!-- Header with Contact Info -->
        <div class="bg-blue-600 p-6 text-center text-white">
            <h1 class="text-2xl font-bold mb-3">מערכת דיווח חירום</h1>
            
            <div class="bg-white/10 backdrop-blur-sm rounded-xl p-3 border border-white/20 inline-block text-sm mb-3">
                <p class="font-bold border-b border-white/30 pb-1 mb-1">למידע נוסף ויצירת קשר:</p>
                <div class="flex flex-col gap-0.5">
                    <p>שיר לניאדו: <a href="tel:050-6816689" class="underline font-bold" dir="ltr">050-6816689</a></p>
                    <p>עינת רותם: <a href="tel:0544372768" class="underline font-bold" dir="ltr">0544372768</a></p>
                </div>
            </div>

            <p class="text-blue-100 text-sm">מושב שאר ישוב</p>
        </div>

        <div class="p-6 space-y-6 text-right">
            <!-- Identification -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">מספר טלפון נייד</label>
                <input type="tel" id="residentPhone" placeholder="לדוגמה: 050-1234567" class="w-full p-4 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500 text-lg dir-ltr text-right">
            </div>

            <!-- Custom Radio Style Buttons -->
            <div class="space-y-3">
                <label class="block text-gray-700 font-semibold mb-1">בחרו את מצבכם הנוכחי:</label>
                
                <button onclick="selectStatus('1')" id="btnStatus1" class="status-btn w-full py-4 px-5 rounded-2xl border-2 border-gray-100 bg-white text-green-700 font-bold text-lg flex items-center gap-4 transition-all hover:bg-green-50">
                    <div class="radio-circle w-6 h-6 rounded-full border-2 border-gray-300 transition-all flex-shrink-0"></div>
                    <span>אני נמצא/ת במושב</span>
                </button>

                <button onclick="selectStatus('0')" id="btnStatus0" class="status-btn w-full py-4 px-5 rounded-2xl border-2 border-gray-100 bg-white text-red-700 font-bold text-lg flex items-center gap-4 transition-all hover:bg-red-50">
                    <div class="radio-circle w-6 h-6 rounded-full border-2 border-gray-300 transition-all flex-shrink-0"></div>
                    <span>אני לא במושב</span>
                </button>

                <button onclick="selectStatus('0_others')" id="btnStatus3" class="status-btn w-full py-4 px-5 rounded-2xl border-2 border-gray-100 bg-white text-blue-700 font-bold text-lg flex items-center gap-4 transition-all hover:bg-blue-50 text-right">
                    <div class="radio-circle w-6 h-6 rounded-full border-2 border-gray-300 transition-all flex-shrink-0"></div>
                    <span class="leading-tight">אני לא נמצא, מדווח על מי שכן</span>
                </button>
            </div>

            <!-- Household counts -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-emerald-50 p-3 rounded-2xl border border-emerald-100 text-center">
                    <label class="block text-xs font-bold text-emerald-900 mb-2 text-center">בני משפחה בבית:</label>
                    <div class="flex items-center justify-center gap-3">
                        <button onclick="changeVal('extraFamily', -1)" class="w-8 h-8 bg-white border border-emerald-200 rounded-full font-bold text-emerald-600 shadow-sm">-</button>
                        <input type="number" id="extraFamily" value="0" readonly class="w-8 text-center font-bold bg-transparent text-lg text-emerald-900">
                        <button onclick="changeVal('extraFamily', 1)" class="w-8 h-8 bg-emerald-600 text-white rounded-full font-bold shadow-md">+</button>
                    </div>
                </div>
                <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100 text-center text-center">
                    <label class="block text-xs font-bold text-blue-900 mb-2 text-center">אורחים בבית:</label>
                    <div class="flex items-center justify-center gap-3">
                        <button onclick="changeVal('extraGuests', -1)" class="w-8 h-8 bg-white border border-blue-200 rounded-full font-bold text-blue-600 shadow-sm">-</button>
                        <input type="number" id="extraGuests" value="0" readonly class="w-8 text-center font-bold bg-transparent text-lg text-blue-900">
                        <button onclick="changeVal('extraGuests', 1)" class="w-8 h-8 bg-blue-600 text-white rounded-full font-bold shadow-md">+</button>
                    </div>
                </div>
            </div>

            <button id="btnSubmit" class="w-full py-5 bg-blue-600 text-white rounded-[1.25rem] font-bold text-xl shadow-xl hover:bg-blue-700 active:scale-95 transition-all">
                שלח דיווח מעודכן
            </button>
            
            <div id="feedback" class="hidden p-4 rounded-xl text-center font-bold text-sm"></div>
        </div>
    </div>

    <script>
        let currentStatus = null;

        function selectStatus(val) {
            // Internal mapping
            currentStatus = (val === '0_others') ? '0' : val;
            
            // UI Update: Reset all
            document.querySelectorAll('.status-btn').forEach(b => {
                b.classList.remove('selected', 'border-green-600', 'border-red-600', 'border-blue-600', 'bg-green-50', 'bg-red-50', 'bg-blue-50');
                b.classList.add('border-gray-100', 'bg-white');
            });

            // Set active
            const btnId = val === '1' ? 'btnStatus1' : (val === '0' ? 'btnStatus0' : 'btnStatus3');
            const activeBtn = document.getElementById(btnId);
            activeBtn.classList.add('selected');
            activeBtn.classList.remove('border-gray-100', 'bg-white');
            
            if (val === '1') activeBtn.classList.add('border-green-600', 'bg-green-50');
            if (val === '0') activeBtn.classList.add('border-red-600', 'bg-red-50');
            if (val === '0_others') activeBtn.classList.add('border-blue-600', 'bg-blue-50');
        }

        function changeVal(id, delta) {
            const el = document.getElementById(id);
            el.value = Math.max(0, parseInt(el.value) + delta);
        }

        document.getElementById('btnSubmit').addEventListener('click', function() {
            const phone = document.getElementById('residentPhone').value.trim();
            const family = document.getElementById('extraFamily').value;
            const guests = document.getElementById('extraGuests').value;
            const fb = document.getElementById('feedback');

            if (phone.replace(/\D/g, '').length < 6 || currentStatus === null) {
                fb.textContent = "אנא מלאו טלפון ובחרו את מצבכם";
                fb.className = "p-4 rounded-xl text-center font-bold text-sm bg-red-100 text-red-700 block";
                return;
            }

            this.disabled = true;
            const originalText = this.innerHTML;
            this.innerHTML = "שולח נתונים...";

            const formData = new URLSearchParams();
            formData.append('id', phone); // שולח טלפון מלא
            formData.append('status', currentStatus);
            formData.append('guests', guests);
            formData.append('family', family);
            formData.append('timestamp', new Date().toLocaleString('he-IL'));

            fetch(GOOGLE_SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                body: formData.toString() 
            })
            .then(() => {
                document.getElementById('mainCard').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
            })
            .catch(() => {
                fb.textContent = "שגיאת תקשורת. נסו שוב.";
                fb.className = "p-4 rounded-xl text-center font-bold text-sm bg-red-100 text-red-700 block";
                this.disabled = false;
                this.innerHTML = originalText;
            });
        });
    </script>
</body>
</html>
